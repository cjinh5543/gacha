<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>얼간이 뽑기</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  :root{--bg:#0d0a1f;--gold:#ffd54a;--purple:#a25bff;--blue:#4aa6ff;--gray:#8b93a7;--dark:#3a3f4d;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard',sans-serif;
    background:radial-gradient(circle at 50% 0%, #1c1440 0%, var(--bg) 60%);
    color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:24px;overflow-x:hidden;}
  h1{font-size:clamp(28px,7vw,44px);font-weight:900;letter-spacing:-1px;text-align:center;margin-top:64px;
    background:linear-gradient(90deg,var(--gold),var(--purple),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 12px rgba(162,91,255,.4));}
  .sub{color:var(--gray);font-size:14px;margin:8px 0 24px;text-align:center;}
  .war-link{display:inline-block;margin:-12px 0 22px;padding:10px 22px;border-radius:999px;text-decoration:none;
    font-weight:800;font-size:14px;color:#fff;background:linear-gradient(90deg,#ff5b5b,#ff8a3a);
    box-shadow:0 6px 20px rgba(255,91,91,.4);transition:transform .15s;}
  .war-link:hover{transform:translateY(-2px) scale(1.03);}

  /* ===== 왼쪽 컬럼 (계정 + 랭킹) ===== */
  .leftcol{position:fixed;top:16px;left:16px;z-index:60;width:214px;
    display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - 32px);overflow-y:auto;}
  .auth,.rankpanel{background:rgba(20,15,45,.92);border:1px solid var(--dark);border-radius:14px;
    padding:14px;backdrop-filter:blur(6px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .auth h4{font-size:12px;color:var(--gray);margin-bottom:10px;font-weight:600;letter-spacing:.5px;}
  .auth input{width:100%;padding:8px 10px;margin-bottom:8px;border-radius:8px;border:1px solid var(--dark);
    background:#120e28;color:#fff;font-family:inherit;font-size:13px;}
  .auth input:focus{outline:1px solid var(--purple);}
  /* 탭 */
  .tabs{display:flex;gap:6px;margin-bottom:12px;}
  .tab{flex:1;padding:8px;border:none;border-radius:8px;font-family:inherit;font-weight:800;font-size:13px;
    cursor:pointer;background:transparent;color:var(--gray);border:1px solid var(--dark);transition:all .12s;}
  .tab.on{background:linear-gradient(90deg,var(--purple),var(--blue));color:#fff;border-color:transparent;}
  .b-primary{background:linear-gradient(90deg,var(--gold),#ffb03a);color:#0d0a1f;}
  .b-primary.full{width:100%;padding:11px;border:none;border-radius:8px;font-family:inherit;font-weight:800;
    font-size:14px;cursor:pointer;transition:transform .1s;}
  .b-primary.full:active{transform:scale(.97);}
  .auth .note{font-size:10px;color:#6b7186;margin-top:8px;line-height:1.4;}
  .auth .err{font-size:11px;color:#ff7b7b;margin-top:2px;min-height:14px;}
  .hidden{display:none;}

  /* 로그인 후 프로필 */
  .profile{display:none;}
  .profile.on{display:block;}
  .profile .pname{font-size:17px;font-weight:900;}
  .profile .pcount{font-size:12px;color:var(--gray);margin:4px 0 6px;}
  .profile .pfood{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:12px;}
  .profile .p-dex{width:100%;padding:11px;border:none;border-radius:9px;font-family:inherit;
    font-weight:800;font-size:14px;cursor:pointer;background:linear-gradient(90deg,var(--purple),var(--blue));color:#fff;}
  .profile .p-logout{width:100%;margin-top:7px;padding:7px;background:transparent;border:1px solid var(--dark);
    color:var(--gray);border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer;}
  /* 랭킹 패널 */
  .rankpanel h4{font-size:12px;color:var(--gray);margin-bottom:10px;font-weight:600;letter-spacing:.5px;}
  .rank-row{display:flex;align-items:center;gap:8px;font-size:12px;margin:6px 0;}
  .rank-row .medal{width:18px;text-align:center;flex:none;font-weight:800;}
  .rank-row .rname{flex:1;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank-row .rnum{color:#cfd4e0;font-variant-numeric:tabular-nums;flex:none;}
  .rank-row.me{color:var(--gold);}
  .rank-row.me .rnum{color:var(--gold);}
  .rank-empty{font-size:11px;color:#6b7186;}

  /* ===== 확률표 (오른쪽 위) ===== */
  .rate-table{position:fixed;top:16px;right:16px;z-index:50;
    background:rgba(20,15,45,.92);border:1px solid var(--dark);border-radius:14px;
    padding:12px 14px;backdrop-filter:blur(6px);box-shadow:0 8px 24px rgba(0,0,0,.4);min-width:150px;}
  .rate-table h4{font-size:12px;color:var(--gray);margin-bottom:8px;font-weight:600;letter-spacing:.5px;}
  .rate-row{display:flex;justify-content:space-between;gap:12px;font-size:12px;margin:5px 0;}
  .rate-name{display:flex;align-items:center;gap:6px;font-weight:700;}
  .rate-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .rate-pct{color:#cfd4e0;font-variant-numeric:tabular-nums;}

  /* ===== 무대 ===== */
  .stage{width:min(340px,88vw);height:460px;position:relative;display:flex;align-items:center;justify-content:center;perspective:1000px;}
  .idle{text-align:center;color:var(--gray);}
  .dino-idle{font-size:120px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(0,0,0,.5));}
  @keyframes float{50%{transform:translateY(-14px);}}
  /* 똥 싸는 공룡 (무대 위쪽) */
  .trex{position:absolute;top:-20px;left:52%;transform:translateX(-50%) scaleX(-1);font-size:130px;z-index:6;pointer-events:none;filter:drop-shadow(0 8px 16px rgba(0,0,0,.5));}
  .trex.pooping{animation:poopStrain 1s ease forwards;}
  @keyframes poopStrain{
    0%{transform:translateX(-50%) scaleX(-1) translateY(-40px) scale(.8);opacity:0;}
    20%{transform:translateX(-50%) scaleX(-1) translateY(0) scale(1);opacity:1;}
    35%{transform:translateX(-50%) scaleX(-1) translateY(0) scale(1.05,.92);}   /* 힘주기 */
    45%{transform:translateX(-50%) scaleX(-1) translateY(0) scale(.94,1.08);}   /* 뿌직 */
    55%{transform:translateX(-50%) scaleX(-1) translateY(0) scale(1.03,.95);}
    75%{transform:translateX(-50%) scaleX(-1) translateY(0) scale(1);opacity:1;}
    100%{transform:translateX(-50%) scaleX(-1) translateY(-30px) scale(.85);opacity:0;}}
  /* 떨어지는 똥 */
  .poop{position:absolute;top:70px;left:50%;transform:translateX(-50%) translateY(85px);font-size:70px;z-index:5;pointer-events:none;}
  .poop.drop{animation:poopDrop 1s ease forwards;}
  @keyframes poopDrop{
    0%{transform:translateX(-50%) translateY(-40px) scale(.3);opacity:0;}
    45%{transform:translateX(-50%) translateY(-40px) scale(.3);opacity:0;}   /* 공룡이 힘주는 동안 대기 */
    60%{transform:translateX(-50%) translateY(90px) scale(1.1);opacity:1;}   /* 뿌직 낙하 */
    72%{transform:translateX(-50%) translateY(80px) scale(1.25,.8);}         /* 착지 찌부 */
    85%{transform:translateX(-50%) translateY(85px) scale(.9,1.1);}
    100%{transform:translateX(-50%) translateY(85px) scale(1);opacity:1;}}
  .poop.fade{animation:poopFade .5s ease forwards !important;}
  @keyframes poopFade{to{opacity:0;transform:translateX(-50%) translateY(120px) scale(.4);}}
  /* 날파리 */
  .fly{position:absolute;left:50%;top:155px;font-size:22px;z-index:7;pointer-events:none;
    transform:translate(-50%,-50%);}
  /* 상위 등급: 무지개 반짝이는 화려한 똥 */
  .poop.fancy{animation:poopDrop 1s ease forwards, poopShine 1.2s linear infinite;}
  @keyframes poopShine{
    0%{filter:drop-shadow(0 0 18px gold) hue-rotate(0deg) saturate(2) brightness(1.2);}
    100%{filter:drop-shadow(0 0 22px gold) hue-rotate(360deg) saturate(2) brightness(1.3);}}
  .card{width:100%;height:100%;border-radius:24px;position:relative;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:28px;text-align:center;
    background:rgba(255,255,255,.04);border:2px solid var(--tier-color,#555);
    box-shadow:0 0 50px var(--tier-glow,transparent),inset 0 0 30px rgba(0,0,0,.4);}
  /* 똥에서 카드가 솟아오름 */
  .card.spit{animation:spit .9s cubic-bezier(.2,.8,.3,1.2);}
  @keyframes spit{0%{transform:translateY(150px) scale(.15) rotate(12deg);opacity:0;}   /* 똥 속에서 */
    45%{transform:translateY(150px) scale(.15) rotate(12deg);opacity:0;}
    65%{transform:translateY(-14px) scale(1.12) rotate(-6deg);opacity:1;}                /* 뿅 솟음 */
    80%{transform:translateY(6px) scale(.96) rotate(3deg);}
    100%{transform:translateY(0) scale(1) rotate(0);opacity:1;}}
  .tier-badge{font-size:15px;font-weight:800;padding:5px 16px;border-radius:999px;
    background:var(--tier-color);color:#0d0a1f;margin-bottom:18px;box-shadow:0 0 18px var(--tier-glow);}
  .photo{width:150px;height:150px;border-radius:50%;object-fit:cover;border:4px solid var(--tier-color);
    background:#222;box-shadow:0 0 30px var(--tier-glow);display:flex;align-items:center;justify-content:center;font-size:64px;}
  .name{font-size:26px;font-weight:900;margin:18px 0 8px;}
  .desc{font-size:15px;color:#d4d8e4;line-height:1.5;}

  .btn{margin-top:24px;padding:16px 44px;font-size:18px;font-weight:800;font-family:inherit;color:#0d0a1f;
    border:none;border-radius:999px;background:linear-gradient(90deg,var(--gold),#ffb03a);
    box-shadow:0 6px 24px rgba(255,176,58,.5);cursor:pointer;transition:transform .15s;}
  .btn:hover{transform:translateY(-2px) scale(1.03);}
  .btn:active{transform:scale(.96);}
  .btn:disabled{opacity:.5;cursor:default;transform:none;}
  .pull-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;}
  .btn.small{padding:14px 26px;font-size:15px;background:linear-gradient(90deg,var(--purple),var(--blue));color:#fff;
    box-shadow:0 6px 20px rgba(120,80,255,.4);}
  .spark{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;background:var(--gold);box-shadow:0 0 8px 2px currentColor;}
  .pity{margin-top:12px;font-size:13px;color:var(--gray);text-align:center;min-height:18px;}
  .pity b{color:var(--blue);}

  /* ===== 연속 뽑기 결과 ===== */
  .multi-modal{width:min(780px,94vw);background:#140f2b;border:1px solid var(--dark);border-radius:20px;padding:24px;}
  .multi-dino{font-size:84px;text-align:center;height:96px;line-height:96px;transform:scaleX(-1);}
  .multi-dino.go{animation:multiStrain .8s ease;}
  @keyframes multiStrain{
    0%{transform:scaleX(-1) translateY(-20px) scale(.85);opacity:.3;}
    15%{transform:scaleX(-1) translateY(0) scale(1);opacity:1;}
    25%,45%,65%,85%{transform:scaleX(-1) scale(1.06,.9);}
    35%,55%,75%,95%{transform:scaleX(-1) scale(.95,1.08);}
    100%{transform:scaleX(-1) translateY(-16px) scale(.9);opacity:1;}}
  .multi-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:8px;min-height:160px;}
  .slot{width:120px;min-height:150px;position:relative;display:flex;align-items:center;justify-content:center;}
  .mpoop{font-size:50px;position:absolute;}
  .mcard{width:120px;border-radius:14px;padding:14px 8px;text-align:center;
    background:rgba(255,255,255,.04);border:2px solid var(--tc,#555);box-shadow:0 0 18px var(--tg,transparent);}
  .mcard .mphoto{width:60px;height:60px;border-radius:50%;margin:0 auto 8px;object-fit:cover;background:#222;
    display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid var(--tc,#444);}
  .mcard .mtier{font-size:10px;font-weight:800;color:var(--tc);}
  .mcard .mname{font-size:14px;font-weight:800;margin-top:2px;}

  /* ===== 도감 모달 ===== */
  .overlay{position:fixed;inset:0;z-index:80;background:rgba(5,3,15,.8);backdrop-filter:blur(4px);
    display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .overlay.on{display:flex;}
  .dex-modal{width:min(720px,94vw);background:#140f2b;border:1px solid var(--dark);border-radius:20px;padding:24px;}
  .dex-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .dex-head h3{font-size:20px;font-weight:900;}
  .dex-head .close{background:transparent;border:1px solid var(--dark);color:#cfd4e0;border-radius:9px;
    width:34px;height:34px;font-size:18px;cursor:pointer;}
  .dex-prog{font-size:13px;color:var(--gray);margin-bottom:16px;}
  .dex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
  .dex-card{border-radius:16px;padding:16px 12px;text-align:center;background:rgba(255,255,255,.03);
    border:1.5px solid var(--dark);position:relative;}
  .dex-card.owned{border-color:var(--tc);box-shadow:0 0 20px -6px var(--tg);}
  .dex-card.locked{filter:grayscale(1);opacity:.45;}
  .dex-photo{width:74px;height:74px;border-radius:50%;margin:0 auto 10px;object-fit:cover;background:#222;
    display:flex;align-items:center;justify-content:center;font-size:36px;border:2.5px solid var(--tc,#444);}
  .dex-name{font-size:15px;font-weight:800;}
  .dex-tier{font-size:11px;font-weight:700;color:var(--tc);margin-top:3px;}
  .dex-desc{font-size:11px;color:var(--gray);margin-top:6px;line-height:1.4;min-height:30px;}
  .dex-count{position:absolute;top:8px;right:8px;font-size:10px;font-weight:800;background:var(--tc);
    color:#0d0a1f;border-radius:999px;padding:2px 7px;}
  .locked-hint{text-align:center;color:var(--gray);font-size:14px;padding:30px 0;}

  /* 카드 상세 (도감 클릭) */
  .card-detail{position:relative;width:min(300px,90vw);background:#161031;border:2px solid var(--tc,#555);
    border-radius:20px;padding:30px 24px;text-align:center;box-shadow:0 0 50px var(--tg,transparent);
    animation:reveal .4s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes reveal{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
  .cd-close{position:absolute;top:12px;right:12px;background:transparent;border:1px solid var(--dark);
    color:#cfd4e0;border-radius:8px;width:30px;height:30px;font-size:16px;cursor:pointer;}
  .cd-tier{display:inline-block;font-size:14px;font-weight:800;padding:5px 16px;border-radius:999px;color:#0d0a1f;margin-bottom:18px;}
  .cd-photo{width:150px;height:150px;border-radius:50%;object-fit:cover;border:4px solid var(--tc);background:#222;
    box-shadow:0 0 30px var(--tg);display:flex;align-items:center;justify-content:center;font-size:64px;margin:0 auto;}
  .cd-name{font-size:26px;font-weight:900;margin:16px 0 4px;}
  .cd-count{font-size:13px;color:var(--gray);margin-bottom:12px;}
  .cd-desc{font-size:15px;color:#d4d8e4;line-height:1.5;}

  /* 오른쪽 컬럼 (먹이 주기 + 뽑기 소식) */
  .rightcol{position:fixed;top:230px;right:16px;z-index:50;width:214px;
    display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - 250px);}
  .feed,.tapper{background:rgba(20,15,45,.92);border:1px solid var(--dark);border-radius:14px;
    padding:12px 14px;backdrop-filter:blur(6px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .feed{overflow-y:auto;min-height:0;}
  .feed h4,.tapper h4{font-size:12px;color:var(--gray);margin-bottom:10px;font-weight:600;letter-spacing:.5px;}
  .feed-item{font-size:12px;line-height:1.45;padding:7px 9px;border-radius:8px;background:rgba(255,255,255,.03);
    margin-bottom:6px;border-left:3px solid var(--fc,#888);animation:feedIn .4s ease;}
  @keyframes feedIn{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:none;}}
  .feed-item b{color:#fff;}
  .feed-item .ft{font-weight:800;color:var(--fc);}
  .feed-empty{font-size:11px;color:#6b7186;}
  /* 먹이 주기 버튼 */
  .tapper{flex:none;text-align:center;}
  .tap-btn{width:100%;padding:16px;border:none;border-radius:12px;font-family:inherit;cursor:pointer;
    background:linear-gradient(135deg,#3a2f6b,#241a4d);color:#fff;font-size:34px;line-height:1;transition:transform .06s;
    display:flex;flex-direction:column;align-items:center;gap:4px;}
  .tap-btn span{font-size:13px;font-weight:800;color:var(--gold);}
  .tap-btn:active{transform:scale(.93);}
  .tap-btn.pop{animation:tapPop .2s ease;}
  @keyframes tapPop{50%{transform:scale(1.08);}}
  .tap-bar{height:8px;background:#0e0b22;border-radius:999px;margin:10px 0 6px;overflow:hidden;}
  .tap-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),#ffb03a);border-radius:999px;transition:width .12s;}
  .tap-info{font-size:11px;color:var(--gray);}
  .tap-info b{color:var(--gold);}
  /* 레벨 표시 */
  .profile .plevel{display:inline-block;font-size:12px;font-weight:800;color:#0d0a1f;background:var(--gold);
    padding:2px 10px;border-radius:999px;margin:4px 0 2px;}
  /* 밭 */
  .farm{flex:none;}
  .farm h4 span{color:var(--gold);font-weight:800;}
  .farm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .farm-slot{aspect-ratio:1;border-radius:10px;border:1.5px dashed var(--dark);background:rgba(255,255,255,.02);
    display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;
    font-size:24px;transition:transform .1s;}
  .farm-slot:hover{border-color:var(--purple);}
  .farm-slot:active{transform:scale(.94);}
  .farm-slot.filled{border-style:solid;border-color:var(--sc,#555);box-shadow:0 0 12px -4px var(--sc);}
  .farm-slot img{width:74%;height:74%;border-radius:50%;object-fit:cover;}
  .farm-slot .b{position:absolute;bottom:2px;right:4px;font-size:10px;font-weight:800;color:var(--gold);}
  .farm-slot .plus{font-size:20px;color:var(--gray);}
  .farm-info{font-size:11px;color:var(--gray);margin-top:8px;line-height:1.4;}
  /* 레벨업 토스트 */
  .levelup{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:150;
    background:linear-gradient(90deg,var(--gold),#ffb03a);color:#0d0a1f;font-weight:800;font-size:15px;
    padding:12px 22px;border-radius:999px;box-shadow:0 8px 30px rgba(255,176,58,.5);opacity:0;pointer-events:none;
    transition:opacity .3s, transform .3s;}
  .levelup.on{opacity:1;transform:translateX(-50%) translateY(0);}
  .levelup b{font-size:18px;}

  /* ===== 모바일: 고정 패널을 일반 흐름으로 내려 겹침 방지 ===== */
  @media (max-width:820px){
    body{padding:16px;}
    .leftcol,.rate-table,.rightcol{position:static;width:100%;max-width:420px;margin:0 auto;max-height:none;overflow:visible;}
    h1{margin-top:6px;order:1;}
    .sub{order:2;}
    .war-link{order:2;}
    .stage{order:3;height:400px;width:min(330px,90vw);}
    .pull-btns{order:4;}
    #pullBtn{order:4;}
    .pity{order:5;}
    .rate-table{order:6;margin-top:18px;}
    .rightcol{order:7;margin-top:12px;}
    .leftcol{order:8;margin-top:12px;}
    .dino-idle{font-size:92px;}
    .trex{font-size:104px;}
    .poop{font-size:56px;}
    .dex-modal{padding:18px;}
  }
</style>
</head>
<body>

<!-- 왼쪽 컬럼 (계정 + 랭킹) -->
<div class="leftcol">
  <div class="auth">
    <!-- 로그인/회원가입 -->
    <div class="authForms" id="authForms">
      <div class="tabs">
        <button class="tab on" id="tabLogin" onclick="showTab('login')">로그인</button>
        <button class="tab" id="tabSignup" onclick="showTab('signup')">회원가입</button>
      </div>
      <!-- 로그인 폼 -->
      <div id="loginForm">
        <input id="li_id" placeholder="아이디" autocomplete="off">
        <input id="li_pw" type="password" placeholder="비밀번호" autocomplete="off">
        <button class="b-primary full" onclick="login()">로그인</button>
      </div>
      <!-- 회원가입 폼 -->
      <div id="signupForm" class="hidden">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================================================
   서버(Supabase) 연결 정보
   ========================================================= */
const SUPABASE_URL = "https://syxodvibawtrdulpwwmp.supabase.co";
const SUPABASE_KEY = "sb_publishable_vEcD6gUy63cO8jTEqCfYRw_T90dB4_g";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* 카드/등급은 이제 서버에서 불러옵니다.
   (수정하려면 Supabase 대시보드의 Table Editor에서 cards / tiers 표를 고치세요) */
let FRIENDS = [];
let TIERS = {};
let TOTAL_RATE = 0;
let HIGH_TIERS = [];

const stage=document.getElementById('stage'), idle=document.getElementById('idle'), btn=document.getElementById('pullBtn');
let currentUser=null;   // 로그인한 아이디
let dex={};             // 현재 유저 도감 {이름:횟수}
let busy=false;         // 연출 진행 중 잠금

/* ---- 확률표: 실제 확률(비율 보정) 표시 ---- */
function renderRateTable(){
  const el=document.getElementById('rateTable');
  el.innerHTML='<h4>확률표</h4>';
  for(const [n,t] of Object.entries(TIERS)){
    const real=(t.rate/TOTAL_RATE*100);
    el.insertAdjacentHTML('beforeend',
      `<div class="rate-row"><span class="rate-name"><span class="rate-dot" style="background:${t.color}"></span>${n}</span><span class="rate-pct">${real.toFixed(2)}%</span></div>`);
  }
}

/* ================= 설정값 ================= */
const PITY_MAX = 10;               // 10회 안에 으이~ 이상 확정
const FOOD_PER_DAY = 10;           // 하루가 넘어갈 때마다 주는 먹이
const START_FOOD = 10;             // 가입 시 기본 먹이
// "으이~ 이상" 판정 (HIGH_TIERS는 서버 데이터 로드 후 채워짐)
const isHigh = name => HIGH_TIERS.includes(name);

/* ---- 한국(KST) 날짜 문자열: 자정(12시 기준) 기준 하루 계산 ---- */
function kstToday(){
  const k = new Date(Date.now() + 9*3600*1000); // UTC+9
  return k.toISOString().slice(0,10);           // "YYYY-MM-DD"
}
function daysBetween(fromStr,toStr){
  const a=new Date(fromStr+'T00:00:00Z'), b=new Date(toStr+'T00:00:00Z');
  return Math.max(0, Math.round((b-a)/86400000));
}

/* ================= 계정 (서버 Supabase) ================= */
let me = null;   // 현재 로그인한 플레이어의 서버 데이터
let token = null;
function err(m){ document.getElementById('authErr').textContent=m||''; }

function showTab(which){
  const login=which==='login';
  document.getElementById('tabLogin').classList.toggle('on',login);
  document.getElementById('tabSignup').classList.toggle('on',!login);
  document.getElementById('loginForm').classList.toggle('hidden',!login);
  document.getElementById('signupForm').classList.toggle('hidden',login);
  err('');
}

// 하루 넘어간 만큼 먹이 지급 (로그인 시 계산)
function grantFood(){
  const today=kstToday();
  const days=daysBetween(me.last_food_date, today);
  if(days>0){ me.food += days*FOOD_PER_DAY; me.last_food_date=today; return true; }
  return false;
}

async function signup(){
  const id=su_id.value.trim(), pw=su_pw.value, nick=su_nick.value.trim();
  if(!id||!pw){err('아이디와 비밀번호를 입력하세요');return;}
  if(!nick){err('닉네임을 입력하세요');return;}
  err('가입 중...');
  const {data,error}=await sb.rpc('signup',{p_id:id,p_pw:pw,p_nick:nick});
  if(error){err('서버 오류: '+error.message);return;}
  if(data.error){err(data.error);return;}
  applySession(data, true);
}
async function login(){
  const id=li_id.value.trim(), pw=li_pw.value;
  if(!id||!pw){err('아이디와 비밀번호를 입력하세요');return;}
  err('로그인 중...');
  const {data,error}=await sb.rpc('login',{p_id:id,p_pw:pw});
  if(error){err('서버 오류: '+error.message);return;}
  if(data.error){err(data.error);return;}
  applySession(data, true);
}
async function applySession(data, isNew){
  me=data; token=data.token; currentUser=data.id;
  if(me.tap_count==null) me.tap_count=0;
  if(me.pulls==null) me.pulls=0;
  if(!Array.isArray(me.farm)) me.farm=[];
  dex=me.dex||{};
  // 밀린 먹이 지급 후 서버에 반영
  if(grantFood()) await saveProgress();
  err('');
  li_id.value=li_pw.value=su_id.value=su_pw.value=su_nick.value='';
  document.getElementById('authForms').classList.add('hidden');
  document.getElementById('profile').classList.add('on');
  document.getElementById('pName').textContent=me.nick;
  idle.style.display='block';
  idle.innerHTML='<div class="dino-idle">🦖</div>버튼을 누르면 공룡이 똥을 싸요 💩';
  localStorage.setItem('gacha_session',JSON.stringify({id:currentUser,token}));
  updateProfile(); updatePity(); renderRank(); renderTapper(); renderLevel(); renderFarm();
}
function logout(){
  me=null; token=null; currentUser=null; dex={};
  document.getElementById('authForms').classList.remove('hidden');
  document.getElementById('profile').classList.remove('on');
  showTab('login');
  stage.querySelectorAll('.card,.trex,.poop').forEach(c=>c.remove());
  idle.style.display='block';
  idle.innerHTML='<div class="dino-idle">🦖</div>로그인하고 뽑아보세요';
  document.getElementById('pity').textContent='';
  renderTapper(); renderLevel(); renderFarm();
  localStorage.removeItem('gacha_session');
}
// 서버에 진행상황 저장
async function saveProgress(){
  if(!currentUser) return;
  const {error}=await sb.rpc('save_progress',{
    p_id:currentUser, p_token:token, p_dex:me.dex, p_food:me.food,
    p_last_food_date:me.last_food_date, p_pity:me.pity,
    p_collect:me.collect, p_collect_at:me.collect_at, p_tap_count:me.tap_count||0,
    p_pulls:me.pulls||0, p_farm:me.farm||[]
  });
  if(error) console.error('저장 실패', error);
}

/* ================= 레벨 & 밭(농사) ================= */
const PULLS_PER_LEVEL=100;                 // 뽑기 100번당 레벨업
const TIER_BONUS=[1,2,3,4,5];              // 낮은 등급→높은 등급: 노예1 … 킹왕짱5 (level 기준)
function myLevel(){ return Math.floor((me.pulls||0)/PULLS_PER_LEVEL)+1; }
function farmSlots(){ return myLevel(); }  // 레벨 1 = 1칸, 레벨마다 +1칸
function tierBonusOf(tierName){
  const keys=Object.keys(TIERS), idx=keys.indexOf(tierName);
  const level=(keys.length-1)-(idx<0?0:idx);        // 0(노예)~최대(킹왕짱)
  return TIER_BONUS[Math.min(level,TIER_BONUS.length-1)];
}
// 배치된 카드들의 총 클릭 보너스
function farmBonus(){
  let b=0;
  (me.farm||[]).forEach(name=>{
    const f=FRIENDS.find(x=>x.name===name);
    if(f) b+=tierBonusOf(f.tier);
  });
  return b;
}
// 한 번 클릭 = 1 + 보너스
function tapPower(){ return 1 + farmBonus(); }
// 뽑기 횟수 증가 + 레벨업 감지
function addPulls(n){
  const before=myLevel();
  me.pulls=(me.pulls||0)+n;
  const after=myLevel();
  if(after>before){ showLevelUp(after); }
  return after>before;
}
function showLevelUp(lv){
  const el=document.getElementById('levelUp');
  el.innerHTML=`🎉 레벨 <b>${lv}</b> 달성! 밭이 <b>${lv}칸</b>으로 늘었어요`;
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),3500);
  renderLevel(); renderFarm();
}

/* ================= 먹이 주기 (터치 50번당 먹이 1개) ================= */
const TAPS_PER_FOOD=50;
function renderTapper(){
  const fill=document.getElementById('tapFill'), info=document.getElementById('tapInfo');
  if(!me){ fill.style.width='0%'; info.textContent='로그인하면 먹이를 줄 수 있어요'; return; }
  const p=me.tap_count||0;
  fill.style.width=(p/TAPS_PER_FOOD*100)+'%';
  const pw=tapPower();
  info.innerHTML=`<b>${p}</b> / ${TAPS_PER_FOOD} · 클릭당 <b>+${pw}</b>`;
}
function doTap(){
  if(!currentUser){ document.getElementById('tapInfo').textContent='먼저 로그인하세요'; return; }
  const btn=document.getElementById('tapBtn');
  btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop');
  me.tap_count=(me.tap_count||0)+tapPower();   // 배치 보너스만큼 한 번에 증가
  let gained=0;
  while(me.tap_count>=TAPS_PER_FOOD){ me.tap_count-=TAPS_PER_FOOD; me.food+=1; gained++; }
  if(gained>0){
    updateProfile();
    document.getElementById('tapInfo').innerHTML=`🍖 <b>먹이 +${gained}!</b>`;
    playTapReward();
    saveProgress();
    setTimeout(renderTapper,700);
  } else {
    playTapClick();
    if((me.tap_count % 10) < tapPower()) saveProgress();  // 대략 10칸마다 저장
    renderTapper();
  }
}
function playTapClick(){
  let ctx; try{ ctx=getCtx(); }catch(e){ return; }
  const t0=ctx.currentTime, o=ctx.createOscillator(), g=ctx.createGain();
  o.type='square'; o.frequency.setValueAtTime(600,t0); o.frequency.exponentialRampToValueAtTime(300,t0+0.05);
  g.gain.setValueAtTime(0.08,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.07);
  o.connect(g).connect(ctx.destination); o.start(t0); o.stop(t0+0.08);
}
function playTapReward(){
  let ctx; try{ ctx=getCtx(); }catch(e){ return; }
  [523,659,784,1047].forEach((f,i)=>{
    const s=ctx.currentTime+i*0.08, o=ctx.createOscillator(), g=ctx.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,s); g.gain.exponentialRampToValueAtTime(0.2,s+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,s+0.4);
    o.connect(g).connect(ctx.destination); o.start(s); o.stop(s+0.42);
  });
}

/* 레벨 & 밭 화면 */
function renderLevel(){
  if(!me) return;
  const lv=myLevel(), inLv=(me.pulls||0)%PULLS_PER_LEVEL;
  document.getElementById('pLevel').textContent=`Lv.${lv} · 다음까지 ${PULLS_PER_LEVEL-inLv}뽑`;
}
function renderFarm(){
  const grid=document.getElementById('farmGrid'), label=document.getElementById('farmBonusLabel'), info=document.getElementById('farmInfo');
  if(!me){ grid.innerHTML=''; label.textContent=''; info.textContent='로그인 후 이용'; return; }
  const slots=farmSlots();
  if(!Array.isArray(me.farm)) me.farm=[];
  grid.innerHTML='';
  for(let i=0;i<slots;i++){
    const name=me.farm[i], f=name?FRIENDS.find(x=>x.name===name):null;
    const cell=document.createElement('div');
    cell.className='farm-slot'+(f?' filled':'');
    if(f){
      const t=TIERS[f.tier]||{color:'#888'};
      cell.style.setProperty('--sc',t.color);
      const isUrl=f.photo.startsWith('http');
      cell.innerHTML=`${isUrl?`<img src="${f.photo}">`:`<span>${f.photo}</span>`}<span class="b">+${tierBonusOf(f.tier)}</span>`;
    } else cell.innerHTML=`<span class="plus">＋</span>`;
    cell.onclick=()=>openPick(i);
    grid.appendChild(cell);
  }
  label.textContent=`(클릭 +${farmBonus()})`;
  info.textContent='칸을 눌러 얼간이를 배치하면 클릭당 먹이가 더 올라요.';
}
let pickSlot=null;
function openPick(i){
  pickSlot=i;
  const grid=document.getElementById('pickGrid'); grid.innerHTML='';
  const clear=document.createElement('div');
  clear.className='dex-card owned'; clear.style.cursor='pointer';
  clear.innerHTML=`<div class="dex-photo">🚫</div><div class="dex-name">비우기</div><div class="dex-tier">&nbsp;</div><div class="dex-desc">이 칸 비우기</div>`;
  clear.onclick=()=>placeCard(null);
  grid.appendChild(clear);
  let any=false;
  FRIENDS.forEach(f=>{
    if(!(dex[f.name]>0)) return; any=true;
    const t=TIERS[f.tier]||{color:'#888',glow:'transparent'};
    const div=document.createElement('div');
    div.className='dex-card owned'; div.style.cursor='pointer';
    div.style.setProperty('--tc',t.color); div.style.setProperty('--tg',t.glow);
    div.innerHTML=`${photoTag(f,'dex-photo')}<div class="dex-name">${f.name}</div><div class="dex-tier">${f.tier}</div><div class="dex-desc">클릭 +${tierBonusOf(f.tier)}</div>`;
    div.onclick=()=>placeCard(f.name);
    grid.appendChild(div);
  });
  if(!any){ grid.insertAdjacentHTML('beforeend','<div class="rank-empty" style="padding:20px">아직 뽑은 얼간이가 없어요</div>'); }
  document.getElementById('pickOverlay').classList.add('on');
}
function closePick(){ document.getElementById('pickOverlay').classList.remove('on'); }
function placeCard(name){
  if(!Array.isArray(me.farm)) me.farm=[];
  while(me.farm.length<farmSlots()) me.farm.push(null);
  me.farm[pickSlot]=name||null;
  saveProgress(); closePick(); renderFarm(); renderTapper();
}

function updateProfile(){
  if(!me) return;
  const got=FRIENDS.filter(f=>dex[f.name]>0).length;
  document.getElementById('pCount').textContent=`수집도 ${got} / ${FRIENDS.length}`;
  document.getElementById('pFood').textContent=`🍖 먹이 ${me.food}개`;
}
function updatePity(){
  if(!me) return;
  const left=PITY_MAX - me.pity;
  document.getElementById('pity').innerHTML=`으이~ 이상 확정까지 <b>${left}</b>회`;
}

/* ================= 랭킹 (서버에서) ================= */
async function renderRank(){
  const box=document.getElementById('rankList');
  const {data,error}=await sb.rpc('get_ranking');
  if(error){ box.innerHTML='<div class="rank-empty">랭킹 불러오기 실패</div>'; return; }
  if(!data || data.length===0){ box.innerHTML='<div class="rank-empty">아직 없음</div>'; return; }
  const medals=['🥇','🥈','🥉','4','5'];
  box.innerHTML=data.map((r,i)=>
    `<div class="rank-row ${me&&r.nick===me.nick?'me':''}">
       <span class="medal">${medals[i]}</span>
       <span class="rname">${r.nick}</span>
       <span class="rnum">${r.collect}종</span>
     </div>`).join('');
}

/* ================= 뽑기 알림 피드 ================= */
async function renderFeed(){
  const box=document.getElementById('feedList');
  const {data,error}=await sb.rpc('get_pull_feed');
  if(error){ return; }
  if(!data || data.length===0){ box.innerHTML='<div class="feed-empty">아직 소식이 없어요</div>'; return; }
  box.innerHTML=data.map(r=>{
    const t=TIERS[r.tier]||{color:'#888'};
    return `<div class="feed-item" style="--fc:${t.color}"><b>${escapeHtml(r.nick)}</b>님이 <span class="ft">${escapeHtml(r.tier)}</span> <b>${escapeHtml(r.card)}</b> 뽑음!</div>`;
  }).join('');
}
async function pushFeed(f){
  if(!isHigh(f.tier)) return;      // 으이~ 이상만 알림
  try{ await sb.rpc('add_pull_feed',{p_id:currentUser,p_token:token,p_card:f.name,p_tier:f.tier}); }
  catch(e){ console.error(e); }
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ================= 뽑기 ================= */
function photoTag(f,cls){
  return f.photo.startsWith('http')
    ? `<img class="${cls}" src="${f.photo}" alt="${f.name}">`
    : `<div class="${cls}">${f.photo}</div>`;
}
function pickTier(forceHigh){
  if(forceHigh){
    // 으이~ 이상만 놓고 그 안에서 비율대로
    const total=HIGH_TIERS.reduce((s,n)=>s+TIERS[n].rate,0);
    let r=Math.random()*total, acc=0;
    for(const n of HIGH_TIERS){ acc+=TIERS[n].rate; if(r<=acc) return n; }
    return HIGH_TIERS.at(-1);
  }
  let r=Math.random()*TOTAL_RATE, acc=0;
  for(const [n,t] of Object.entries(TIERS)){acc+=t.rate; if(r<=acc) return n;}
  return Object.keys(TIERS).at(-1);
}
function pull(){
  if(busy) return;
  if(!currentUser){err('먼저 로그인하세요');li_id.focus();showTab('login');return;}
  if(me.food<=0){
    document.getElementById('pity').innerHTML='먹이가 없어요! 🍖 내일 자정에 10개 충전돼요';
    return;
  }

  // 천장: 이번이 10번째면 으이~ 이상 확정
  const forceHigh = (me.pity >= PITY_MAX-1);
  const tierName=pickTier(forceHigh);
  let pool=FRIENDS.filter(f=>f.tier===tierName);
  if(pool.length===0) pool=FRIENDS;
  const f=pool[Math.floor(Math.random()*pool.length)];
  const t=TIERS[f.tier]||{color:"#888",glow:"transparent"};

  // 먹이 소모 + 천장 카운트 갱신
  me.food -= 1;
  me.pity = isHigh(f.tier) ? 0 : me.pity+1;
  addPulls(1);

  // 도감 반영
  dex[f.name]=(dex[f.name]||0)+1;
  me.dex=dex;
  const newCollect=FRIENDS.filter(x=>dex[x.name]>0).length;
  if(newCollect > (me.collect||0)){ me.collect=newCollect; me.collect_at=new Date().toISOString(); }
  saveProgress(); // 서버에 저장 (비동기)

  busy=true; setPullEnabled(false); idle.style.display='none';
  stage.querySelectorAll('.card,.trex,.poop').forEach(c=>c.remove());

  // 1) 공룡이 힘주기
  const trex=document.createElement('div');
  trex.className='trex pooping'; trex.textContent='🦖';
  stage.appendChild(trex);
  // 2) 똥이 뿌직 떨어짐 — 등급에 따라 색·크기·화려함 다르게
  const tierKeys=Object.keys(TIERS);
  const tierIdx=tierKeys.indexOf(f.tier);                 // 0 = 최고 등급
  const level=(tierKeys.length-1) - (tierIdx<0?0:tierIdx); // 0(노예) ~ 최대(킹왕짱)
  const maxLevel=tierKeys.length-1;
  const poop=document.createElement('div');
  poop.className='poop drop'; poop.textContent='💩';
  poop.style.fontSize=(64+level*8)+'px';
  const glowSize=6+level*11;
  const hueShift=hexToHue(t.color)-30;                    // 갈색(≈30) 기준으로 색 틴트
  let filter=`drop-shadow(0 0 ${glowSize}px ${t.color}) drop-shadow(0 0 ${glowSize/2}px ${t.color})`;
  if(level===0)      filter+=' grayscale(.6) brightness(.85)';        // 노예: 칙칙
  else if(level===1) filter+=' grayscale(.3)';                        // 하층민
  else               filter+=` hue-rotate(${hueShift}deg) saturate(${1.3+level*0.4}) brightness(${1+level*0.05})`;
  poop.style.filter=filter;
  if(level>=maxLevel-1) poop.classList.add('fancy');       // 상위 2등급: 무지개 반짝
  stage.appendChild(poop);
  // 등급별 소리
  playPoopSound(level, maxLevel);
  // 똥이 착지하면 날파리가 주변을 한 바퀴 (등급 높을수록 많이)
  setTimeout(()=>spawnFlies(level, t.color), 600);
  // 3) 날파리가 한 바퀴 돈 뒤, 똥에서 카드가 뿅 솟아오름
  setTimeout(()=>{
    poop.classList.add('fade');
    const card=document.createElement('div');
    card.className='card spit';
    card.style.setProperty('--tier-color',t.color);
    card.style.setProperty('--tier-glow',t.glow);
    card.innerHTML=`<div class="tier-badge">${f.tier}</div>${photoTag(f,'photo')}<div class="name">${f.name}</div><div class="desc">${f.desc}</div>`;
    stage.appendChild(card);
    sparkle(t.color, level, maxLevel);
    playSplat(level, maxLevel);
    runCardEffect(f, {stage, card, color:t.color, level, name:f.name});
  },1950);
  setTimeout(()=>{trex.remove();poop.remove();},2450);

  updateProfile(); updatePity(); renderRank();
  renderLevel(); renderFarm(); renderTapper();
  pushFeed(f).then(renderFeed);
  setTimeout(()=>{busy=false; setPullEnabled(true);},2500);
}

/* 날파리가 똥 주변을 한 바퀴 */
function spawnFlies(level, color){
  const count=1+level;                     // 노예 1마리 ~ 킹왕짱 5마리
  const R=52+level*5;                       // 등급 높을수록 크게 돎
  for(let i=0;i<count;i++){
    const fly=document.createElement('div');
    fly.className='fly'; fly.textContent='🪰';
    if(level>=3) fly.style.filter=`drop-shadow(0 0 6px ${color})`; // 상위 등급: 빛나는 날파리
    stage.appendChild(fly);
    const phase=(360/count)*i;              // 균등 배치
    const steps=[];
    for(let a=0;a<=360;a+=12){
      const rad=(phase+a)*Math.PI/180;
      const wob=1+0.08*Math.sin(rad*3);     // 살짝 지그재그
      steps.push({transform:`translate(calc(-50% + ${Math.cos(rad)*R*wob}px), calc(-50% + ${Math.sin(rad)*R*wob}px))`});
    }
    fly.animate(steps,{duration:1300,easing:'linear'}).onfinish=()=>fly.remove();
  }
}

/* 색상 hex → 색상환 각도(hue) */
function hexToHue(hex){
  const m=hex.replace('#','');
  const r=parseInt(m.substr(0,2),16)/255, g=parseInt(m.substr(2,2),16)/255, b=parseInt(m.substr(4,2),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  if(d===0) return 0;
  let h;
  if(mx===r) h=((g-b)/d)%6;
  else if(mx===g) h=(b-r)/d+2;
  else h=(r-g)/d+4;
  h*=60; if(h<0) h+=360;
  return h;
}

/* ================= 효과음 (등급별) ================= */
let audioCtx=null;
function getCtx(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playPoopSound(level, maxLevel){
  let ctx; try{ ctx=getCtx(); }catch(e){ return; }
  const t0=ctx.currentTime;

  // 1) 공통 "뿌직" — 등급 높을수록 크고 우렁차게
  const vol=0.18+level*0.05;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(200,t0);
  o.frequency.exponentialRampToValueAtTime(65,t0+0.35);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(vol,t0+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+0.4);
  o.connect(g).connect(ctx.destination);
  o.start(t0); o.stop(t0+0.42);
  // 부르르 떨림
  const lfo=ctx.createOscillator(), lg=ctx.createGain();
  lfo.frequency.value=18+level*4; lg.gain.value=35;
  lfo.connect(lg).connect(o.frequency); lfo.start(t0); lfo.stop(t0+0.38);

  // 2) 등급 축하 벨소리 — 높을수록 음이 많고 화려함
  const scales=[
    [],                                   // 노예: 소리 없음(뿌직만)
    [330],                                // 하층민: 짧은 삑
    [392,523],                            // 으이~: 두 음
    [523,659,784],                        // 레젼드: 세 음 아르페지오
    [523,659,784,1047,1319]               // 킹왕짱: 화려한 다섯 음
  ];
  const notes=scales[Math.min(level,scales.length-1)];
  notes.forEach((freq,i)=>{
    const s=t0+0.34+i*0.09;
    const oo=ctx.createOscillator(), gg=ctx.createGain();
    oo.type='triangle'; oo.frequency.value=freq;
    gg.gain.setValueAtTime(0.0001,s);
    gg.gain.exponentialRampToValueAtTime(0.22,s+0.02);
    gg.gain.exponentialRampToValueAtTime(0.0001,s+0.5);
    oo.connect(gg).connect(ctx.destination);
    oo.start(s); oo.stop(s+0.55);
  });
}

function sparkle(color, level=1, maxLevel=4){
  sparkleXY(innerWidth/2, innerHeight/2.6, color, level);
}
function sparkleAt(el, color, level=1){
  const r=el.getBoundingClientRect();
  sparkleXY(r.left+r.width/2, r.top+r.height/2, color, level);
}
function sparkleXY(cx, cy, color, level=1){
  const n=8+level*10;                       // 등급 높을수록 반짝이 많이
  for(let i=0;i<n;i++){
    const s=document.createElement('div');
    s.className='spark'; s.style.color=color; s.style.left=cx+'px'; s.style.top=cy+'px';
    s.style.zIndex=200;
    document.body.appendChild(s);
    const ang=Math.random()*6.28, dist=60+Math.random()*(100+level*35);
    const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    s.animate([{transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${dx}px,${dy}px) scale(0)`,opacity:0}],
      {duration:700+Math.random()*400,easing:'cubic-bezier(.1,.7,.3,1)'}).onfinish=()=>s.remove();
  }
}

/* ================= 카드 전용 연출 =================
   새 연출은 CARD_EFFECTS에 "이름(effect)": function(ctx){...} 형태로 추가하세요.
   ctx = { stage, card, color, level, name }
   관리자 페이지에서 카드의 "전용 연출" 칸에 그 이름을 적으면 이 연출이 발동돼요.
   (비워두면 등급 기본 연출만 나옵니다) */
const CARD_EFFECTS = {
  // 예시: 황금 왕관이 솟고 금빛 폭죽
  golden_crown(ctx){
    const crown=document.createElement('div');
    crown.textContent='👑';
    crown.style.cssText='position:absolute;left:50%;top:4px;transform:translateX(-50%);font-size:42px;z-index:9;pointer-events:none;';
    ctx.stage.appendChild(crown);
    crown.animate([
      {transform:'translateX(-50%) translateY(30px) scale(0)',opacity:0},
      {transform:'translateX(-50%) translateY(-6px) scale(1.2)',opacity:1},
      {transform:'translateX(-50%) translateY(0) scale(1)',opacity:1}],
      {duration:600,easing:'cubic-bezier(.2,.9,.3,1.4)',fill:'forwards'});
    for(let i=0;i<3;i++) setTimeout(()=>sparkleAt(ctx.card,'#ffd54a',4),i*180);
    setTimeout(()=>crown.remove(),2200);
  },
  // 예시: 무지개 폭죽
  rainbow_burst(ctx){
    const colors=['#ff5b5b','#ffb03a','#ffd54a','#5bd97a','#4aa6ff','#a25bff'];
    colors.forEach((c,i)=>setTimeout(()=>sparkleAt(ctx.card,c,4),i*90));
  }
};
function runCardEffect(f, ctx){
  if(f && f.effect && CARD_EFFECTS[f.effect]){
    try{ CARD_EFFECTS[f.effect](ctx); }catch(e){ console.error('연출 오류', e); }
  }
}

/* ================= 연속 뽑기 (5연차 / 10연차) ================= */
function setPullEnabled(on){
  [document.getElementById('pullBtn'),document.getElementById('pull5'),document.getElementById('pull10')]
    .forEach(b=>{ if(b) b.disabled=!on; });
}
async function pullMulti(n){
  if(busy) return;
  if(!currentUser){err('먼저 로그인하세요');showTab('login');return;}
  if(me.food < n){
    document.getElementById('pity').innerHTML=`먹이가 부족해요! (${n}개 필요, 지금 ${me.food}개)`;
    return;
  }
  busy=true; setPullEnabled(false);

  // n번 굴리기 (천장 카운트가 뽑기 사이에 이어짐)
  const results=[];
  for(let i=0;i<n;i++){
    const forceHigh=(me.pity >= PITY_MAX-1);
    const tierName=pickTier(forceHigh);
    let pool=FRIENDS.filter(f=>f.tier===tierName);
    if(pool.length===0) pool=FRIENDS;
    const f=pool[Math.floor(Math.random()*pool.length)];
    me.food -= 1;
    me.pity = isHigh(f.tier) ? 0 : me.pity+1;
    dex[f.name]=(dex[f.name]||0)+1;
    results.push(f);
  }
  me.dex=dex;
  const nc=FRIENDS.filter(x=>dex[x.name]>0).length;
  if(nc > (me.collect||0)){ me.collect=nc; me.collect_at=new Date().toISOString(); }
  addPulls(n);
  saveProgress();
  updateProfile(); updatePity(); renderRank();
  renderLevel(); renderFarm(); renderTapper();
  // 으이~ 이상 뽑은 것들 알림에 기록
  (async()=>{ for(const f of results){ await pushFeed(f); } renderFeed(); })();

  animateMulti(n, results);
}
function animateMulti(n, results){
  const ov=document.getElementById('multiOverlay');
  const row=document.getElementById('multiRow');
  const dino=document.getElementById('multiDino');
  document.getElementById('multiTitle').textContent=`${n}연차 결과`;
  document.getElementById('multiClose').style.visibility='hidden';
  row.innerHTML=''; ov.classList.add('on');

  // 티라노가 뿌뿌뿌...직 여러 번
  playBurstSound(n);
  dino.classList.remove('go'); void dino.offsetWidth; dino.classList.add('go');

  const tierKeys=Object.keys(TIERS), maxLevel=tierKeys.length-1;
  const slots=[];
  const STAGGER=Math.max(60, 320/n);        // 개수 많으면 빨리 날아옴

  results.forEach((f,i)=>{
    const t=TIERS[f.tier]||{color:"#888",glow:"transparent"};
    const idx=tierKeys.indexOf(f.tier);
    const level=maxLevel-(idx<0?0:idx);
    const slot=document.createElement('div'); slot.className='slot';
    const poop=document.createElement('div'); poop.className='mpoop'; poop.textContent='💩';
    poop.style.filter=`drop-shadow(0 0 ${6+level*8}px ${t.color})`;
    slot.appendChild(poop); row.appendChild(slot);
    slots.push({slot,poop,f,t,level});
    // 똥이 위에서 날아와 자리에 진열
    poop.animate([
      {transform:'translateY(-180px) scale(.3) rotate(-20deg)',opacity:0},
      {transform:'translateY(0) scale(1) rotate(0)',opacity:1}
    ],{duration:480,delay:300+i*STAGGER,easing:'cubic-bezier(.2,.8,.3,1.3)',fill:'both'});
  });

  // 다 진열된 뒤 차례대로 터짐
  const lineupDone = 300 + (n-1)*STAGGER + 480 + 250;
  const POP=340;
  slots.forEach((s,i)=>{
    setTimeout(()=>{
      s.poop.animate([{transform:'scale(1)',opacity:1},{transform:'scale(1.7)',opacity:0}],
        {duration:220,fill:'forwards'});
      playReveal(s.level, maxLevel);
      playSplat(s.level, maxLevel);
      setTimeout(()=>{
        s.poop.remove();
        const card=document.createElement('div'); card.className='mcard';
        card.style.setProperty('--tc',s.t.color); card.style.setProperty('--tg',s.t.glow);
        card.innerHTML=`${photoTag(s.f,'mphoto')}<div class="mtier">${s.f.tier}</div><div class="mname">${s.f.name}</div>`;
        card.animate([{transform:'scale(.3) rotateY(90deg)',opacity:0},{transform:'scale(1) rotateY(0)',opacity:1}],
          {duration:340,easing:'cubic-bezier(.2,.9,.3,1.3)',fill:'both'});
        s.slot.appendChild(card);
        if(s.level>=maxLevel-1) sparkleAt(s.slot, s.t.color, s.level);
        runCardEffect(s.f, {stage:s.slot, card, color:s.t.color, level:s.level, name:s.f.name});
      },180);
    }, lineupDone + i*POP);
  });

  // 끝나면 버튼 다시 활성화 + 닫기 버튼 표시
  const total = lineupDone + n*POP + 200;
  setTimeout(()=>{
    document.getElementById('multiClose').style.visibility='visible';
    busy=false; setPullEnabled(true);
  }, total);
}
function closeMulti(){ document.getElementById('multiOverlay').classList.remove('on'); }

/* 뿌뿌뿌...직 (여러 번 방귀) */
function playBurstSound(n){
  let ctx; try{ ctx=getCtx(); }catch(e){ return; }
  const bursts=Math.min(n,8);
  for(let i=0;i<bursts;i++){
    const t0=ctx.currentTime+0.06*i;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(150+Math.random()*60,t0);
    o.frequency.exponentialRampToValueAtTime(80,t0+0.05);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.14,t0+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.06);
    o.connect(g).connect(ctx.destination); o.start(t0); o.stop(t0+0.07);
  }
  // 마지막 "직~"
  const t1=ctx.currentTime+0.06*bursts;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(200,t1); o.frequency.exponentialRampToValueAtTime(60,t1+0.4);
  g.gain.setValueAtTime(0.0001,t1); g.gain.exponentialRampToValueAtTime(0.22,t1+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t1+0.45);
  o.connect(g).connect(ctx.destination); o.start(t1); o.stop(t1+0.47);
}
/* 카드 공개 시 짧은 소리 (등급별) */
function playReveal(level, maxLevel){
  let ctx; try{ ctx=getCtx(); }catch(e){ return; }
  const t0=ctx.currentTime;
  // 톡 터지는 소리
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type='square'; o.frequency.setValueAtTime(400,t0); o.frequency.exponentialRampToValueAtTime(140,t0+0.08);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.12,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+0.12);
  o.connect(g).connect(ctx.destination); o.start(t0); o.stop(t0+0.13);
  // 상위 등급이면 벨소리 살짝
  const chords=[[],[ ],[784],[784,1047],[784,1047,1319]];
  const notes=chords[Math.min(level,chords.length-1)];
  notes.forEach((freq,i)=>{
    const s=t0+0.05+i*0.06, oo=ctx.createOscillator(), gg=ctx.createGain();
    oo.type='triangle'; oo.frequency.value=freq;
    gg.gain.setValueAtTime(0.0001,s); gg.gain.exponentialRampToValueAtTime(0.16,s+0.02);
    gg.gain.exponentialRampToValueAtTime(0.0001,s+0.35);
    oo.connect(gg).connect(ctx.destination); oo.start(s); oo.stop(s+0.4);
  });
}

/* 똥이 터지며 카드 나올 때 "퍽!" 방귀+파열음 (등급별로 다르게) */
function playSplat(level, maxLevel){
  let ctx; try{ ctx=getCtx(); }catch(e){ return; }
  const t0=ctx.currentTime;
  // 젖은 "퍽~" 노이즈 (등급 높을수록 크고 길게)
  const dur=0.18+level*0.04;
  const buf=ctx.createBuffer(1, ctx.sampleRate*dur, ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2); }
  const src=ctx.createBufferSource(); src.buffer=buf;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=500+level*250;
  const ng=ctx.createGain(); ng.gain.value=0.25+level*0.05;
  src.connect(lp).connect(ng).connect(ctx.destination); src.start(t0);
  // "뿡" 톤 (아래로 훅)
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(220+level*20,t0); o.frequency.exponentialRampToValueAtTime(70,t0+0.18);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.2,t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+0.22);
  o.connect(g).connect(ctx.destination); o.start(t0); o.stop(t0+0.24);
  // 상위 등급이면 반짝 벨소리
  const chords=[[],[],[988],[988,1319],[988,1319,1760]];
  const notes=chords[Math.min(level,chords.length-1)];
  notes.forEach((freq,i)=>{
    const s=t0+0.12+i*0.07, oo=ctx.createOscillator(), gg=ctx.createGain();
    oo.type='triangle'; oo.frequency.value=freq;
    gg.gain.setValueAtTime(0.0001,s); gg.gain.exponentialRampToValueAtTime(0.18,s+0.02);
    gg.gain.exponentialRampToValueAtTime(0.0001,s+0.4);
    oo.connect(gg).connect(ctx.destination); oo.start(s); oo.stop(s+0.45);
  });
}
function openDex(){
  const grid=document.getElementById('dexGrid'); grid.innerHTML='';
  let count=0;
  FRIENDS.forEach(f=>{
    const t=TIERS[f.tier]||{color:"#888",glow:"transparent"};
    const got=dex[f.name]||0; if(got>0) count++;
    const div=document.createElement('div');
    div.className='dex-card '+(got>0?'owned':'locked');
    div.style.setProperty('--tc',t.color); div.style.setProperty('--tg',t.glow);
    div.innerHTML = got>0
      ? `<div class="dex-count">×${got}</div>${photoTag(f,'dex-photo')}<div class="dex-name">${f.name}</div><div class="dex-tier">${f.tier}</div><div class="dex-desc">${f.desc}</div>`
      : `<div class="dex-photo">❓</div><div class="dex-name">???</div><div class="dex-tier">미획득</div><div class="dex-desc">아직 안 뽑았어요</div>`;
    if(got>0){ div.style.cursor='pointer'; div.onclick=()=>showCardDetail(f,got); }
    grid.appendChild(div);
  });
  document.getElementById('dexProg').textContent=`${count} / ${FRIENDS.length} 수집`;
  document.getElementById('overlay').classList.add('on');
}
function closeDex(){ document.getElementById('overlay').classList.remove('on'); }
function showCardDetail(f, got){
  const t=TIERS[f.tier]||{color:"#888",glow:"transparent"};
  const box=document.getElementById('cardDetail');
  box.style.setProperty('--tc',t.color); box.style.setProperty('--tg',t.glow);
  box.innerHTML=`
    <button class="cd-close" onclick="closeCardDetail()">×</button>
    <div class="cd-tier" style="background:${t.color}">${f.tier}</div>
    ${photoTag(f,'cd-photo')}
    <div class="cd-name">${f.name}</div>
    <div class="cd-count">보유 ×${got}</div>
    <div class="cd-desc">${f.desc}</div>`;
  document.getElementById('cardDetailOverlay').classList.add('on');
}
function closeCardDetail(){ document.getElementById('cardDetailOverlay').classList.remove('on'); }

/* ================= 서버에서 카드/등급 불러오기 ================= */
async function loadGameData(){
  const [{data:tiers,error:e1},{data:cards,error:e2}] = await Promise.all([
    sb.from('tiers').select('*').order('sort_order'),
    sb.from('cards').select('*')
  ]);
  if(e1||e2){ throw (e1||e2); }

  TIERS = {};
  tiers.forEach(t=>{ TIERS[t.name]={color:t.color, glow:t.glow, rate:Number(t.rate)}; });
  TOTAL_RATE = Object.values(TIERS).reduce((s,t)=>s+t.rate,0);
  HIGH_TIERS = tiers.slice(0,3).map(t=>t.name); // 위쪽 3개 = 으이~ 이상

  FRIENDS = cards.map(c=>({ name:c.name, photo:c.photo, desc:c.description, tier:c.tier, effect:c.effect||null }));
}

    return;
  }
  renderRateTable();

  renderFeed();
  renderTapper();

  renderFarm();

  idle.innerHTML='<div class="dino-idle">🦖</div>로그인하고 뽑아보세요';

  // 새로고침 시 토큰으로 세션 복구
  const saved=localStorage.getItem('gacha_session');

    try{
      const {id,token:tk}=JSON.parse(saved);

      else localStorage.removeItem('gacha_session');
    }catch(e){ localStorage.removeItem('gacha_session'); }
  }
})();
